name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          A42B02: ${{ secrets.A42B02 }}
          BB1482: ${{ secrets.BB1482 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A42B02', ''), os.environ.get('BB1482', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- b1654207b0244639a354d59e99efb82d -->', a)
          if b:
              patched = patched.replace('<!-- 89042102fe1edd6beabcbf1d4097618a6bb7 -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
